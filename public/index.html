<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Realtime Chat POC</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="page">
      <section id="auth-view" class="auth-view">
        <div class="auth-card">
          <h1>Realtime Chat</h1>
          <p>Sign in to continue.</p>

          <form id="auth-form" class="auth-form">
            <div class="form-group">
              <label for="auth-user">Username</label>
              <input id="auth-user" placeholder="akshay" required />
            </div>
            <div class="form-group">
              <label for="auth-display">Display name (for register)</label>
              <input id="auth-display" placeholder="Akshay Jain" />
            </div>
            <div class="form-group">
              <label for="auth-pass">Password</label>
              <input id="auth-pass" type="password" placeholder="••••••••" required />
            </div>

            <div class="auth-actions">
              <button type="submit" class="btn">Login</button>
              <button id="register-btn" type="button" class="btn secondary">Register</button>
            </div>
          </form>

          <p id="auth-status" class="status-text"></p>
        </div>
      </section>

      <section id="chat-view" class="app-shell hidden">
        <aside class="sidebar">
          <div class="brand-row">
            <div>
              <h2 id="current-user">@user</h2>
              <p class="subtle">Conversations</p>
            </div>
            <button id="logout-btn" class="btn secondary small" type="button">Logout</button>
          </div>

          <form id="new-chat-form" class="new-chat-form">
            <input id="new-chat-peer" placeholder="Start chat with username" required />
            <button class="btn" type="submit">Open</button>
          </form>

          <div id="chat-list" class="chat-list"></div>
        </aside>

        <section class="chat-panel">
          <header class="chat-header">
            <div class="title-wrap">
              <h2 id="chat-title">Select a conversation</h2>
              <p id="connection-status" class="status-line">
                <span id="status-dot" class="status-dot connecting"></span>
                <span id="connection-status-text">Connecting...</span>
              </p>
            </div>
            <button id="reconnect-btn" class="btn secondary small" type="button">Reconnect</button>
          </header>

          <section id="messages" class="messages"></section>

          <form id="composer" class="composer">
            <input id="message-input" placeholder="Type a message" autocomplete="off" required />
            <button class="btn" type="submit">Send</button>
          </form>
        </section>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
